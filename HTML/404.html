<body class="error404">

<div data-include="partials/header.html"></div>

<!-- Maps to 404.php -->

<section class="not-found">
  <div class="container">
    <div class="not-found-inner">
      <p class="not-found-code" aria-hidden="true">404</p>
      <!-- the_title() fallback or static heading -->
      <h1 class="not-found-title">This page isn’t in the story</h1>
      <p class="not-found-text">The link may be broken, the page may have moved, or the URL might be mistyped. Let’s get you back to something worth reading.</p>

      <div class="button-row not-found-actions">
        <a href="homepage.html" class="btn btn-primary">Back to home</a>
        <a href="page.html" class="btn">About us</a>
      </div>

      <!-- get_search_form() -->
      <form class="not-found-search" role="search" aria-label="Site search">
        <input type="search" name="s" placeholder="Search the site" aria-label="Search">
        <button type="submit" class="btn">Search</button>
      </form>

      <nav class="not-found-links" aria-label="Helpful links">
        <p class="not-found-links-label">Popular destinations</p>
        <div class="not-found-links-list">
          <a href="homepage.html">Home</a>
          <a href="page.html">About us</a>
          <a href="single.html">Latest story</a>
          <a href="#">Contact</a>
        </div>
      </nav>
    </div>
  </div>
</section>
